name: Build & Release

on:
  push:
    branches:
      - main                 # 推送到 main 时自动构建校验
    tags:
      - 'v*'                 # 推送 v1.0.0 等 tag 时触发发布
  workflow_dispatch:          # 允许手动触发

permissions:
  contents: write             # 允许创建 Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 重编译原生模块 (better-sqlite3)
        run: npx electron-rebuild -f -w better-sqlite3

      - name: 构建前端
        run: npm run build

      - name: 打包 (electron-builder)
        run: npx electron-builder --win --publish=never

      - name: 上传构建产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KMusic-${{ github.ref_name }}
          path: release/*.zip

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $zip = Get-ChildItem release\*.zip | Select-Object -First 1
          gh release create $env:GITHUB_REF_NAME $zip --title "KMusic $env:GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
