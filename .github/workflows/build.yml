name: Build KMusic

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Vite
        run: npx vite build

      - name: Build Electron (zip)
        run: npx electron-builder --win zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KMusic-win-x64
          path: release/KMusic-*.zip
